<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>皇紀メモ</title>
<style>
:root{ 
  --bg:#0f0a1a;
  --panel:#1a1230;
  --panel2:#150e28;
  --text:#f0f0f5;
  --muted:#b8a0d8;
  --line:rgba(139,92,246,.25);
  --accent:#8B5CF6;
  --accent-bright:#a78bfa;
  --danger:#ff3366;
  --gold:#FCD34D;
  --radius:16px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  position:sticky;top:0;z-index:10;
  padding:14px 20px 10px;
  background:linear-gradient(to bottom, rgba(32,33,36,.96), rgba(32,33,36,.70));
  backdrop-filter: blur(10px);
  border-bottom:3px solid var(--gold);
  box-shadow: 0 3px 12px rgba(252,211,77,.4);
}
  
.row{display:flex;align-items:center;gap:10px}
.between{justify-content:space-between}
.title{
  font-weight:700;
  letter-spacing:.02em;
  font-size:18px;
}
.crumb{
  margin-top:6px;
  color:var(--muted);
  font-size:12px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.btn{
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  color:var(--text);
  border-radius:14px;
  padding:10px 12px;
  font-weight:650;
  font-size:14px;
  line-height:1;
  user-select:none;
}
.btn:active{transform:translateY(1px)}
.btn.accent{border-color:rgba(139,92,246,.5); background:rgba(139,92,246,.15); color:var(--accent-bright)}
.btn.danger{border-color:rgba(236,72,153,.5); background:rgba(236,72,153,.15); color:var(--danger)}

.btn.icon{padding:10px 12px; min-width:44px; text-align:center}
.pill{
  flex:1;
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
  border-radius:16px;
  padding:10px 12px;
  min-width:0;
}
.pill input{
  width:100%;
  border:0; outline:0;
  background:transparent;
  color:var(--text);
  font-size:14px;
  min-width:0;
}
main{padding:12px 20px 80px}

.panel{
  background: linear-gradient(to bottom, 
    #2a1a4a 0%, 
    #1a1230 100%);
  border:1px solid rgba(139,92,246,.3);
  border-radius:var(--radius);
  padding:14px;
  margin:12px 0;
  position:relative;
}
.panel::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    linear-gradient(45deg, transparent 45%, rgba(139,92,246,.08) 48%, rgba(139,92,246,.08) 52%, transparent 55%),
    linear-gradient(-45deg, transparent 45%, rgba(139,92,246,.08) 48%, rgba(139,92,246,.08) 52%, transparent 55%);
  pointer-events:none;
  border-radius:var(--radius);
}

.panel h3{
  margin:0 0 10px;
  font-size:13px;
  color:var(--muted);
  font-weight:700;
  letter-spacing:.06em;
}
.item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px 14px;
  border-radius:14px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--line);
  margin:10px 0;
}
.item:active{transform:translateY(1px)}
.left{display:flex;align-items:center;gap:10px;min-width:0}
.ico{font-size:16px; opacity:.9}
.name{
  font-weight:700;
  font-size:15px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  min-width:0;
}
.meta{
  display:flex;align-items:center;gap:10px;
  color:var(--muted);
  font-size:12px;
  flex-shrink:0;
}
.meta span{opacity:.9}
.arrow{color:var(--muted); opacity:.7}
.fab{
  position:fixed; right:16px; bottom:18px;
  display:flex; gap:10px;
  z-index:20;
}
.fab .btn{border-radius:18px; padding:12px 14px}
#editorView{
  position:fixed; inset:0;
  background:var(--bg);
  display:none;
  flex-direction:column;
  z-index:50;
}
#editorTop{
  position:sticky; top:0;
  padding:14px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(to bottom, rgba(32,33,36,.98), rgba(32,33,36,.78));
  backdrop-filter: blur(10px);
}
#editorTop .small{color:var(--muted); font-size:12px}
#titleInput{
  width:100%;
  margin-top:10px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.03);
  color:var(--text);
  border-radius:14px;
  padding:12px 12px;
  font-size:15px;
  outline:none;
  font-weight:700;
}
#bodyInput{
  flex:1;
  width:100%;
  border:0;
  outline:none;
  resize:none;
  background:transparent;
  color:var(--text);
  padding:14px;
  font-size:15px;
  line-height:1.7;
}
.spacer{height:8px}
.hint{color:var(--muted); font-size:12px}
.tag{
  display:inline-block;
  padding:4px 10px;
  border-radius:10px;
  font-size:11px;
  font-weight:650;
  border:1px solid var(--line);
  background:rgba(255,255,255,.04);
  color:var(--muted);
  user-select:none;
  cursor:pointer;
}

.tag.active{
  border-color:var(--gold);
  background:rgba(252,211,77,.15);
  color:var(--gold);
}
.tag.selected{
  border-color:var(--gold);
  background:rgba(252,211,77,.15);
  color:var(--gold);
}

#tagSelector{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin:14px 0 10px;
}

#customDialog{
  position:fixed; inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}
#dialogBox{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:20px;
  max-width:90vw;
  width:340px;
}
#dialogTitle{
  font-size:16px;
  font-weight:700;
  margin-bottom:12px;
  color:var(--text);
}
#dialogMessage{
  font-size:14px;
  color:var(--muted);
  margin-bottom:20px;
  line-height:1.5;
}
#dialogButtons{
  display:flex;
  gap:10px;
  justify-content:flex-end;
}

#dialogButtons .btn {
  font-size: 13px;
  padding: 10px 8px;
}

.btn:disabled{
  opacity:0;
  pointer-events:none;
}

#editorTitle {
  font-size: 16px;
  font-weight: 700;
  text-align: left;
  padding: 20px 24px 10px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 20px;
}

#previewArea {
  padding: 20px 24px;
  font-size: 12px;
  line-height: 1.8;
  text-align: justify;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>
<header>
  <div class="row between">
    <div class="row" style="min-width:0">
      <button class="btn icon" id="backBtn" title="上へ">←</button>
      <div style="min-width:0">
        <div class="title" id="headTitle" data-i18n="ホーム">解体現場</div>
        <div class="crumb" id="breadcrumb">/</div>
      </div>
    </div>
  </div>

  <div class="spacer"></div>

  <div id="tagFilter" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;"></div>

  <div class="row">
    <div class="row">
      <button class="btn icon" id="modeBtn" title="モード切替">待</button>
    </div>
    
    <div class="pill">
      <span class="ico">➵</span>
      <input id="qInput" data-ph="タイトル/本文の一部（任意）" placeholder="タイトル/本文の一部（任意）" />
    </div>
    <button class="btn" id="renameFolderBtn" data-i18n="フォルダ名変更">フォルダ名変更</button>
  </div>
</header>

<main>
  <div class="panel" id="foldersPanel">
    <h3 data-i18n="フォルダ">フォルダ</h3>
    <div id="foldersList"></div>
    <div class="hint" id="foldersEmpty" style="display:none;" data-i18n="フォルダなし">フォルダなし</div>
  </div>

  <div class="panel" id="memosPanel">
    <h3 data-i18n="メモ">メモ</h3>
    <div id="memosList"></div>
    <div class="hint" id="memosEmpty" style="display:none;" data-i18n="メモなし">メモなし</div>
  </div>
</main>

<div class="fab">
  <button class="btn accent" id="exportBtn" style="display:none;" data-i18n="＋エクスポート">＋エクスポート</button>
  <button class="btn accent" id="addMemoBtn" data-i18n="＋メモ">＋メモ</button>
  <button class="btn accent" id="addFolderBtn" data-i18n="＋フォルダ">＋フォルダ</button>  
</div>

<div id="editorView">
  <div id="editorTop">
    <div class="row between">
      <div class="row" style="gap:8px">
        <button class="btn icon" id="closeEditorBtn">←</button>
        <button class="btn icon" id="previewBtn" title="プレビュー">※</button>
        <button class="btn icon" id="saveHistoryBtn" data-i18n-title="バックアップ">▼</button>
        <button class="btn icon" id="showHistoryBtn" data-i18n-title="履歴">▲</button>
      </div>
      <div class="small" id="charCount" data-i18n="文字数">文字数 0</div>
      <div class="small" id="saveStatus" style="color:var(--muted)" data-i18n="保存済み">保存済み</div>
    </div>
    <div id="editorTitle" style="display:none; font-size:15px; font-weight:700; margin-top:10px;"></div>
    <input id="titleInput" data-ph="タイトル" placeholder="タイトル" />
    <div id="tagSelector"></div>
  </div>
    
  <textarea id="bodyInput" data-ph="ここに本文を書く" placeholder="ここに本文を書く。"></textarea>
  <div id="previewArea" style="display:none; flex:1; padding:14px; font-size:12px; line-height:1.7; overflow-y:auto; white-space:pre-wrap; word-wrap:break-word;"></div>
</div>

<div id="customDialog">
  <div id="dialogBox">
    <div id="dialogTitle"></div>
    <div id="dialogMessage"></div>
    <input id="dialogInput" style="display:none; width:100%; margin:10px 0; padding:12px; border:1px solid var(--line); background:rgba(255,255,255,.03); color:var(--text); border-radius:12px; outline:none; font-size:14px;" />
    <div id="dialogButtons"></div>
  </div>
</div>

<script>
/** ========= 設定 ========= */
const CONFIG = {
  showMemosOnTop: true,
  autosaveMs: 600,
  storageKey: "memoTreeV2_notaUI"
};

/** ========= データ ========= */
function newNode(){ return { folders:{}, memos:{} }; }
function now(){ return Date.now(); }
function uid(){ return "m_" + Math.random().toString(36).slice(2) + "_" + now().toString(36); }

const TAGS = ["健全", "R18", "完成", "未完成", "短編", "長編", "プロット", "メモ"];

let root = load() || newNode();
let path = [];
let editingId = null;
let autosaveTimer = null;
let selectedTags = [];
let sortMode = "updatedDesc";
let isPreviewMode = false;

const el = (id)=>document.getElementById(id);

const MODE_KEY = "memoTree_mode_kouki";
let koukiMode = localStorage.getItem(MODE_KEY) === "1";

const DICT_NORMAL = {};
const DICT_KOUKI = {
  "ホーム":"解体現場",
  "保存":"処理完了",
  "戻る":"退く",
  "取消":"見逃す",
  "決定":"嬲り殺す",
  "閉じる":"撤収",
  "検索":"索敵",
  "フォルダ名変更":"標的変更",
  "削除":"屠る",
  "フォルダ":"獲物",
  "メモ":"肉片",
  "フォルダなし":"欠品中",
  "メモなし":"空腹",
  "＋メモ":"＋解体",
  "＋フォルダ":"＋仕留める",
  "文字数":"重量",
  "タイトル":"味付け",
  "ここに本文を書く":"解体ショーの始まりだ",
  "タイトル/本文の一部（任意）":"索敵（照準を合わせる）",
  "(無題)":"(無味)",
  "名前を変更":"風味を調整",
  "名前を変更しました":"味を調整した",
  "上書きしました":"仕込み完了だ",
  "変更が競合しています":"オーダーが重複した",
  "保存中":"俺の獲物だ",
  "保存済み":"熟成させる",
  "フォルダ名":"獲物名",
  "＋エクスポート":"＋納品",
  "新しいフォルダ名":"血祭りに上げてやる",
  "メモを削除しますか？":"生贄はこいつか？",
  "フォルダを削除しますか？":"皆殺しだ",
  "本当に削除しますか？":"覚悟は出来てるんだろうな？",
  "保存出来ませんでした":"熟成が足りねえ",
  "同名フォルダがあります":"弱肉強食だ",
  "エクスポートするメモがありません":"納品する肉片がねえ",
  "ホームは変更出来ません":"縄張りを荒らすな",
  "ホームは削除出来ません":"生きて帰れると思うな",
  "メモが見付かりません":"仕入れ前だ",
  "複製":"裂く",
  "字":"kg",
  "操作を選んでください":"お前が選べ",
  "履歴":"残骸",
  "バックアップ":"冷蔵",
  "バックアップしました":"冷蔵保管完了",
  "履歴がありません":"捌いた記憶はねえ",
  "履歴から復元":"過去の獲物",
  "復元するメモを選んでください":"どの獲物が目的だ？",
  "復元しました":"取引成立だ",
  "キャンセル":"断る",
  "OK":"上等だ",
  "並び替え":"刺す",
  "並び順を選んでください":"さっさとやれ",
  "更新日時(新→古)":"鮮度順(新鮮→腐敗)",
  "更新日時(古→新)":"鮮度順(腐敗→新鮮)",
  "文字数(多→少)":"重量順(重→軽)",
  "文字数(少→多)":"重量順(軽→重)",
  "タイトル(あいうえお)":"産地順(あいうえお)",
  "タイトル(逆順)":"産地順(逆順)",
  "手動":"俺に指図するな",
  "一番上へ":"晒す",
  "ひとつ上":"吊るす",
  "ひとつ下":"沈める",
  "一番下へ":"埋める",
  "名前変更":"風味調整",
  "新規フォルダ作成":"息の根を止める",
  "フォルダ名を変更":"解体し直す",
  "新しい名前を入力してください":"気が変わった",
  "エラー":"身の程を弁えろ",
  "プレビュー":"味見",
  "編集に戻る":"調理に戻る"
};

function dict(){
  return koukiMode ? DICT_KOUKI : DICT_NORMAL;
}
function t(s){
  const d = dict();
  return d[s] ?? s;
}

function load(){
  try{
    const s = localStorage.getItem(CONFIG.storageKey);
    if(!s) return null;
    return JSON.parse(s);
  }catch(e){ return null; }
}

function persist(){
  try{
    localStorage.setItem(CONFIG.storageKey+"_bak", JSON.stringify(root));
    localStorage.setItem(CONFIG.storageKey, JSON.stringify(root));
  }catch(e){
    alert(t("保存出来ませんでした"));
  }
}

function getNode(p = path){
  let node = root;
  for(const name of p){
    if(!node.folders[name]) node.folders[name] = newNode();
    node = node.folders[name];
  }
  return node;
}

function getParentNode(){
  return getNode(path.slice(0, -1));
}

function folderCharSum(node){
  let sum = 0;
  for(const id in node.memos){
    sum += (node.memos[id].text || "").length;
  }
  for(const fname in node.folders){
    sum += folderCharSum(node.folders[fname]);
  }
  return sum;
}

function setCrumb(){
  el("headTitle").textContent = path.length ? path[path.length-1] : t("ホーム");
  el("breadcrumb").textContent = "/" + path.join("/");
  el("backBtn").disabled = path.length === 0;
}

function sortMemos(memos){
  const pinned = memos.filter(m => m.pinned);
  const unpinned = memos.filter(m => !m.pinned);
  
  pinned.sort((a,b) => (a.sortOrder||0) - (b.sortOrder||0));
  
  const withOrder = unpinned.filter(m => m.sortOrder !== undefined);
  const withoutOrder = unpinned.filter(m => m.sortOrder === undefined);
  
  if(sortMode === "manual"){
    withOrder.sort((a,b) => (a.sortOrder||0) - (b.sortOrder||0));
    withoutOrder.sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
    return [...pinned, ...withOrder, ...withoutOrder];
  }
  
  const all = [...unpinned];
  
  let sorted;
  switch(sortMode){
    case "updatedDesc":
      sorted = all.sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
      break;
    case "updatedAsc":
      sorted = all.sort((a,b) => (a.updatedAt||0) - (b.updatedAt||0));
      break;
    case "lengthDesc":
      sorted = all.sort((a,b) => (b.text||"").length - (a.text||"").length);
      break;
    case "lengthAsc":
      sorted = all.sort((a,b) => (a.text||"").length - (b.text||"").length);
      break;
    case "titleAsc":
      sorted = all.sort((a,b) => (a.title||"").localeCompare(b.title||"", "ja"));
      break;
    case "titleDesc":
      sorted = all.sort((a,b) => (b.title||"").localeCompare(a.title||"", "ja"));
      break;
    default:
      sorted = all.sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
  }
  
  return [...pinned, ...sorted];
}

function sortFolders(folders, node){
  const folderData = folders.map(name => ({
    name,
    data: node.folders[name],
    pinned: node.folders[name].pinned || false,
    sortOrder: node.folders[name].sortOrder || 0
  }));
  
  const pinned = folderData.filter(f => f.pinned);
  const unpinned = folderData.filter(f => !f.pinned);
  
  pinned.sort((a,b) => a.sortOrder - b.sortOrder);
  unpinned.sort((a,b) => a.name.localeCompare(b.name, "ja"));
  
  return [...pinned, ...unpinned].map(f => f.name);
}

function render(){
  setCrumb();
  const node = getNode();
  const q = (el("qInput").value || "").trim().toLowerCase();

  const folderNames = Object.keys(node.folders);
  const sortedFolders = sortFolders(folderNames, node);
  const foldersList = el("foldersList");
  foldersList.innerHTML = "";
  let folderShown = 0;
  
  for(const name of sortedFolders){
    if(q){
      const sub = node.folders[name];
      const hit = hasHitInFolder(sub, q);
      if(!hit) continue;
    }
    folderShown++;

    const sub = node.folders[name];
    const memoCount = Object.keys(sub.memos).length;
    const charSum = folderCharSum(sub);
    const isPinned = sub.pinned || false;

    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="left" style="min-width:0">
        <div class="name" title="${escapeHtml(name)}">${escapeHtml(name)}</div>
      </div>
      <div class="meta">
        <span>〆 ${memoCount}</span>
        <span>✔ ${charSum}</span>
        <button class="btn icon pin-btn" style="padding:4px 8px; margin:0 4px; font-size:16px;">${isPinned ? '★' : '☆'}</button>
        <span class="arrow">›</span>
      </div>
    `;
    
    const pinBtn = div.querySelector('.pin-btn');
    pinBtn.addEventListener('click', (e)=>{
      e.stopPropagation();
      toggleFolderPin(name);
    });
    
    let pressTimer;
    let menuShown = false;

    const showFolderMenu = async ()=>{
      if(menuShown) return;
      menuShown = true;
      
      const choice = await showDialog(
        name,
        t("操作を選んでください"),
        [
          { text: t("名前変更"), value: "rename" },
          { text: t("並び替え"), value: "sort" },
          { text: t("戻る"), value: "cancel" },
          { text: t("削除"), value: "delete", danger: true }
        ]
      );
      
      menuShown = false;
      
      if(choice === "rename"){
        const nu = await showInputDialog(t("フォルダ名を変更"), t("新しい名前を入力してください"), name);
        if(!nu || nu === name) return;
        const node = getNode();
        if(node.folders[nu]){ 
          await showDialog(t("エラー"), t("同名フォルダがあります"), [{text: t("OK"), value: true}]);
          return;
        }
        node.folders[nu] = node.folders[name];
        delete node.folders[name];
        persist();
        render();
      } else if(choice === "sort"){
        await showFolderSortMenu(name);
      } else if(choice === "delete"){
        await deleteFolder(name);
      }
    };

    div.addEventListener("touchstart", (e)=>{
      if(e.target.classList.contains('pin-btn')) return;
      menuShown = false;
      pressTimer = setTimeout(showFolderMenu, 500);
    });

    div.addEventListener("touchend", ()=>{
      clearTimeout(pressTimer);
    });

    div.addEventListener("touchcancel", ()=>{
      clearTimeout(pressTimer);
    });

    div.addEventListener("click", (e)=>{
      if(e.target.classList.contains('pin-btn') || e.target.closest('.pin-btn')) return;
      if(!menuShown){
        path.push(name);
        render();
      }
    });
    
    foldersList.appendChild(div);
  }
  el("foldersEmpty").style.display = folderShown ? "none" : "block";

function reorderFolder(folderName, direction){
  const node = getNode();
  const folderNames = Object.keys(node.folders);
  
  folderNames.forEach((name, idx) => {
    if(node.folders[name].sortOrder === undefined){
      node.folders[name].sortOrder = idx;
    }
  });
  
  const targetFolder = node.folders[folderName];
  if(!targetFolder) return;
  
  const pinnedFolders = folderNames
    .filter(name => node.folders[name].pinned)
    .map(name => ({ name, sortOrder: node.folders[name].sortOrder || 0 }))
    .sort((a, b) => a.sortOrder - b.sortOrder);
  
  if(!targetFolder.pinned || pinnedFolders.length === 0) return;
  
  const currentIndex = pinnedFolders.findIndex(f => f.name === folderName);
  if(currentIndex === -1) return;
  
  switch(direction){
    case "top":
      targetFolder.sortOrder = (pinnedFolders[0].sortOrder || 0) - 1;
      break;
    case "up":
      if(currentIndex > 0){
        const prevFolder = node.folders[pinnedFolders[currentIndex - 1].name];
        const temp = targetFolder.sortOrder;
        targetFolder.sortOrder = prevFolder.sortOrder;
        prevFolder.sortOrder = temp;
      }
      break;
    case "down":
      if(currentIndex < pinnedFolders.length - 1){
        const nextFolder = node.folders[pinnedFolders[currentIndex + 1].name];
        const temp = targetFolder.sortOrder;
        targetFolder.sortOrder = nextFolder.sortOrder;
        nextFolder.sortOrder = temp;
      }
      break;
    case "bottom":
      targetFolder.sortOrder = (pinnedFolders[pinnedFolders.length - 1].sortOrder || 0) + 1;
      break;
  }
  
  persist();
  render();
}

function reorderMemo(memoId, direction){
  const node = getNode();
  const memos = Object.values(node.memos);
  
  memos.forEach((m, idx) => {
    if(m.sortOrder === undefined){
      m.sortOrder = idx;
    }
  });
  
  const targetMemo = node.memos[memoId];
  if(!targetMemo) return;
  
  sortMode = "manual";
  const sorted = sortMemos(memos);
  const currentIndex = sorted.findIndex(m => m.id === memoId);
  
  if(currentIndex === -1) return;
  
  switch(direction){
    case "top":
      if(targetMemo.pinned){
        const pinnedMemos = sorted.filter(m => m.pinned);
        targetMemo.sortOrder = (pinnedMemos[0].sortOrder || 0) - 1;
      } else {
        const unpinnedMemos = sorted.filter(m => !m.pinned);
        targetMemo.sortOrder = (unpinnedMemos[0].sortOrder || 0) - 1;
      }
      break;
    case "up":
      if(currentIndex > 0){
        const prevMemo = sorted[currentIndex - 1];
        if(prevMemo.pinned === targetMemo.pinned){
          const temp = targetMemo.sortOrder;
          targetMemo.sortOrder = prevMemo.sortOrder;
          prevMemo.sortOrder = temp;
        }
      }
      break;
    case "down":
      if(currentIndex < sorted.length - 1){
        const nextMemo = sorted[currentIndex + 1];
        if(nextMemo.pinned === targetMemo.pinned){
          const temp = targetMemo.sortOrder;
          targetMemo.sortOrder = nextMemo.sortOrder;
          nextMemo.sortOrder = temp;
        }
      }
      break;
    case "bottom":
      if(targetMemo.pinned){
        const pinnedMemos = sorted.filter(m => m.pinned);
        targetMemo.sortOrder = (pinnedMemos[pinnedMemos.length - 1].sortOrder || 0) + 1;
      } else {
        targetMemo.sortOrder = (sorted[sorted.length - 1].sortOrder || 0) + 1;
      }
      break;
  }
  
  persist();
  render();
}

function exportMemos(){
  const node = getNode();
  const memos = Object.values(node.memos);
  
  const filtered = memos.filter(m=>{
    if(!m.tags) return false;
    return selectedTags.some(tag => m.tags.includes(tag));
  });
  
  if(filtered.length === 0){
    alert(t("エクスポートするメモがありません"));
    return;
  }
  
  let text = "";
  filtered.forEach((m, i)=>{
    text += `========== ${m.title || t("(無題)")} ==========\n\n`;
    text += m.text + "\n\n";
    if(i < filtered.length - 1) text += "\n";
  });
  
  const date = new Date().toISOString().split('T')[0];
  const filename = `SS_text_${date}.txt`;
  const blob = new Blob([text], {type: 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function hasHitInFolder(node, q){
  for(const id in node.memos){
    const m = node.memos[id];
    const titleLower = (m.title||"").toLowerCase();
    const x = (m.text||"").toLowerCase();
    if(titleLower.includes(q) || x.includes(q)) return true;
  }
  for(const name in node.folders){
    if(hasHitInFolder(node.folders[name], q)) return true;
  }
  return false;
}

function duplicateMemo(id){
  const node = getNode();
  const m = node.memos[id];
  if(!m){ 
    alert(t("メモが見付かりません"));
    return;
  }
  
  let newTitle = m.title || "";
  const match = newTitle.match(/^(.+?)_(\d+)$/);
  if(match){
    newTitle = match[1] + "_" + (parseInt(match[2]) + 1);
  } else {
    newTitle = newTitle + "_2";
  }

  const newId = uid();
  node.memos[newId] = {
    id: newId,
    title: newTitle,
    text: m.text,
    updatedAt: now(),
    tags: [...(m.tags || [])],
    sortOrder: m.sortOrder
  };
  persist();
  render();
}

function renderTagSelector(m){
  const selector = el("tagSelector");
  if(!selector) return;
  selector.innerHTML = "";
  
  if(!m.tags) m.tags = [];
  
  TAGS.forEach(tag=>{
    const span = document.createElement("span");
    span.className = "tag";
    if(m.tags.includes(tag)) span.classList.add("selected");
    span.textContent = tag;
    span.addEventListener("click", ()=>{
      toggleTag(m, tag);
      renderTagSelector(m);
      saveMemo(true);
    });
    selector.appendChild(span);
  });
}

function toggleTag(m, tag){
  if(!m.tags) m.tags = [];
  const idx = m.tags.indexOf(tag);
  if(idx >= 0){
    m.tags.splice(idx, 1);
  } else {
    m.tags.push(tag);
  }
}

function renderTagFilter(){
  const filter = el("tagFilter");
  if(!filter) return;
  filter.innerHTML = "";
  
  TAGS.forEach(tag=>{
    const span = document.createElement("span");
    span.className = "tag";
    if(selectedTags.includes(tag)) span.classList.add("active");
    span.textContent = tag;
    span.addEventListener("click", ()=>{
      const idx = selectedTags.indexOf(tag);
      if(idx >= 0){
        selectedTags.splice(idx, 1);
      } else {
        selectedTags.push(tag);
      }
      renderTagFilter();
      render();
    });
    filter.appendChild(span);
  });

  const exportBtn = el("exportBtn");
  if(exportBtn){
    exportBtn.style.display = selectedTags.length > 0 ? "block" : "none";
  }
}

  const node = getNode();

  if(!m.history) m.history = [];
  
  const snapshot = {
    title: m.title,
    text: m.text,
    savedAt: now()
  };
  
  m.history.push(snapshot);
  
  if(m.history.length > 10){
    m.history.shift();
  }
  
  persist();
  alert(t("バックアップしました"));
}

async function showHistory(){
  if(!editingId) return;
  const node = getNode();
  const m = node.memos[editingId];
  if(!m || !m.history || m.history.length === 0){
    alert(t("履歴がありません"));
    return;
  }
  
  const buttons = m.history.map((h, idx)=>{
    const date = new Date(h.savedAt);
    const dateStr = date.toLocaleString("ja-JP");
    return {
      text: `${idx+1}. ${dateStr} (${h.text.length}文字)`,
      value: idx
    };
  }).reverse();
  
  buttons.push({ text: t("戻る"), value: -1 });
  
  const choice = await showDialog(
    t("履歴から復元"),
    t("復元するメモを選んでください"),
    buttons
  );
  
  if(choice >= 0){
    const h = m.history[choice];
    el("titleInput").value = h.title;
    el("bodyInput").value = h.text;
    updateCharCount();
    saveMemo(true);
    alert(t("復元しました"));
  }
}

function toggleMode(){
  koukiMode = !koukiMode;
  localStorage.setItem(MODE_KEY, koukiMode ? "1" : "0");
  renderModeBtn();
  applyDict();
  render();
}

function applyDict(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.getAttribute("data-i18n");
    el.textContent = t(key);
  });
  document.querySelectorAll("[data-ph]").forEach(el=>{
    const key = el.getAttribute("data-ph");
    el.setAttribute("placeholder", t(key));
  });
  document.querySelectorAll("[data-i18n-title]").forEach(el=>{
    const key = el.getAttribute("data-i18n-title");
    el.setAttribute("title", t(key));
  });
}

function renderModeBtn(){
  const btn = el("modeBtn");
  if(btn){
    btn.textContent = koukiMode ? "皇" : "待";
    btn.title = koukiMode ? "通常モードへ" : "皇紀モードへ";
  }
}

el("backBtn")?.addEventListener("click", goUp);
el("addFolderBtn")?.addEventListener("click", addFolder);
el("addMemoBtn")?.addEventListener("click", addMemo);
el("renameFolderBtn")?.addEventListener("click", renameCurrentFolder);
el("closeEditorBtn")?.addEventListener("click", closeEditor);
el("qInput")?.addEventListener("input", ()=>render());
el("titleInput")?.addEventListener("input", showSaving);
el("bodyInput")?.addEventListener("input", ()=>{ 
  updateCharCount(); 
  showSaving();
  if(isPreviewMode) updatePreview();
});
el("exportBtn")?.addEventListener("click", exportMemos);
el("saveHistoryBtn")?.addEventListener("click", saveHistory);
el("showHistoryBtn")?.addEventListener("click", showHistory);
el("previewBtn")?.addEventListener("click", togglePreview);

if(el("modeBtn")) el("modeBtn").addEventListener("click", toggleMode);

renderModeBtn();
applyDict();
render();
</script>
</body>
</html>
